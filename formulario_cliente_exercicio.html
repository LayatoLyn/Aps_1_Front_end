<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Informações Pessoais</h1>
    <br>
    <fieldset>
        <legend>Cadastro do Cliente</legend>
        <p>
        <label for="">Nome: </label>
        <input type="text" placeholder="Digite o nome do cliente" size="100px">
        </p>

        <p>
        <label for="">Idade: </label>
        <input type="number" placeholder="Digite a idade">
        </p>

        <p>
        <label for="">Endereço: </label>
        <input type="text" placeholder="Digite o endereço" size="100px">
        </p>

        <p>
        <label for="">Cidade: </label>
        <input type="text" placeholder="Digite a cidade">
        </p>

        <p>
        <label for="">Estado: </label>
        <input type="text" placeholder="UF" size="2px">
        </p>

        <p>
        <label for="">CEP: </label>
        <input type="text" maxlength="2" placeholder="XXXXX-XXX">
        </p>

        <p>
        <label for="">Tel/Res: </label>
        <input type="tel" placeholder="99 99999-9999">
        </p>

        <p>
        <label for="">Tel/Cel: </label>
        <input type="tel" placeholder="99 99999-9999">
        </p>

        <p>
        <label for="">Email: </label>
        <input type="email" placeholder="Digite o endereço de email" size="100px">
        </p>
    </fieldset>
    <input type="submit" name="Enviar">
</body>
</html>
